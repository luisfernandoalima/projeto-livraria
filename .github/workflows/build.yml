name: Build Tauri Windows

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependências do projeto
        working-directory: ./app/desktop
        run: npm install

      - name: Build
        working-directory: ./app/desktop
        env:
          NUXT_PUBLIC_API_URL: https://sua-api.com
        run: npx tauri build

      - name: Disponibilizar o instalador para download
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
            path: app/desktop/src-tauri/target/release/desktop.exe  # ← executável direto
